- id: gloss-algoritmekader
  term: Algoritmekader
  omschrijving: "Het Algoritmekader van de Rijksoverheid: leidraad en concrete maatregelen voor verantwoorde inzet van algoritmes, inclusief inkoop en governance."
  seeAlso:
    - algoritmekader

- id: gloss-algoritmeregister
  term: Algoritmeregister
  omschrijving: Openbaar register waarin Nederlandse overheidsorganisaties publiceren welke algoritmes en AI-toepassingen zij gebruiken.
  seeAlso:
    - algoritmeregister

- id: gloss-avg
  term: AVG
  omschrijving: Europese privacywet (Algemene Verordening Gegevensbescherming) die regelt hoe persoonsgegevens verwerkt mogen worden. Bepalend bij iedere AI-toepassing die persoonsgegevens raakt.

- id: gloss-bio2
  term: BIO2
  omschrijving: Het verplichte informatiebeveiligingskader voor de Nederlandse overheid (Baseline Informatiebeveiliging Overheid v1.3). Iedere infrastructuurkeuze wordt hieraan getoetst.
  seeAlso:
    - bio2

- id: gloss-common-ground
  term: Common Ground
  omschrijving: Architectuurprincipes van VNG voor gemeentelijke IT, gericht op het loskoppelen van data en applicaties zodat data eenmaal opgeslagen en meervoudig gebruikt wordt.

- id: gloss-dpia
  term: DPIA
  omschrijving: "Verplichte voorafgaande risicobeoordeling (Data Protection Impact Assessment) bij gegevensverwerkingen met een hoog privacyrisico. Vrijwel altijd vereist bij AI-systemen."

- id: gloss-gemma
  term: GEMMA
  omschrijving: Gemeentelijke Modelarchitectuur van VNG Realisatie. Referentiearchitectuur voor de informatievoorziening van gemeenten en vertrekpunt voor gemeentelijke AI-projecten.
  seeAlso:
    - common-ground
    - nora

- id: gloss-nora
  term: NORA
  omschrijving: Het overkoepelende architectuurkader voor de Nederlandse overheid (Nederlandse Overheid Referentie Architectuur). Beschrijft principes, standaarden en bouwblokken voor digitale dienstverlening.
  seeAlso:
    - bio2

- id: gloss-open-source
  term: Open source
  omschrijving: "Software waarvan de broncode publiek beschikbaar is. Kernuitgangspunt van de visie Digitale Autonomie: open waar kan, beschermen waar moet."
  seeAlso:
    - visie-digitale-autonomie

- id: gloss-rag
  term: RAG
  omschrijving: Techniek (Retrieval-Augmented Generation) waarbij een taalmodel voor het antwoorden eerst relevante documenten ophaalt uit een eigen kennisbron. Beperkt hallucinaties en houdt bronnen traceerbaar.

- id: gloss-soevereiniteit
  term: Soevereiniteit
  omschrijving: Het vermogen van Nederland om eigen digitale infrastructuur, data en kennis te beheren zonder afhankelijk te zijn van enkele buitenlandse partijen.
  seeAlso:
    - visie-digitale-autonomie

- id: gloss-verantwoorde-ai
  term: Verantwoorde AI
  omschrijving: Verzamelterm voor de principes (transparantie, uitlegbaarheid, non-discriminatie, menselijke regie) waaraan AI-toepassingen binnen de overheid moeten voldoen.

- id: gloss-vlam-ai
  term: VLAM.AI
  omschrijving: "On-premise GPU-cluster van SSC-ICT (Veilige Lokale AI Modellen) in overheidsdatacenters met API-toegang, vlam-chat en vlam-search. Acht ministeries aangesloten."
  seeAlso:
    - visie-digitale-autonomie
